# Standards release register.
# Refresh official evidence before using this for implementation decisions.
checked_at: "2026-06-05"
policy:
  copy_only: true
  no_source_code_updates_until_gap_recorded: true
  track_latest_and_tested_against_separately: true
  o_ran_release_tracking: "per WG/spec/interface, not global"
  tmforum_release_tracking: "API spec version and CTK/RI asset version are separate"
fields:
  - standards_body
  - standard_family
  - spec_id
  - interface_or_api
  - latest_open_or_active
  - latest_frozen_or_stable
  - stable_target_baseline
  - local_tested_against
  - local_test_evidence_path
  - implementation_path
  - source_asset_version
  - conformance_level
  - known_gap_to_latest
  - next_step
  - official_source_url
  - official_evidence_checked_at
  - evidence_snapshot_path
  - notes
